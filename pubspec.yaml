name: fittrack
description: FitTrack - Your Personal Fitness Companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  hive_flutter: ^1.1.0
  go_router: ^13.0.0
  flutter_local_notifications: ^16.3.0
  uuid: ^4.3.3
  google_fonts: ^6.1.0
  percent_indicator: ^4.2.3
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
